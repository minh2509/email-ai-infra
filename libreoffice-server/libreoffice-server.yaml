apiVersion: apps/v1
kind: Deployment
metadata:
  name: libreoffice-server
  namespace: middleware
  labels:
    app: libreoffice-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: libreoffice-server
  template:
    metadata:
      labels:
        app: libreoffice-server
    spec:
      containers:
      - name: libreoffice
        image: ghcr.io/unoconv/unoserver-docker:latest
        command: ["/bin/sh", "-c"]
        args:
          - |
            # Cài đặt socat
            apt-get update && apt-get install -y socat || true
            
            # Khởi động unoserver với LibreOffice
            unoserver &
            
            # Đợi LibreOffice khởi động
            sleep 10
            
            # Forward port 5000 → 2002
            echo "Forwarding port 5000 to 2002..."
            socat TCP-LISTEN:5000,fork,reuseaddr TCP:127.0.0.1:2002 &
            
            echo "Server ready! Port 5000 forwarded to LibreOffice on 2002"
            tail -f /dev/null
        ports:
        - containerPort: 5000
          name: unoserver
        resources:
          limits:
            memory: "2Gi"
            cpu: "1000m"
          requests:
            memory: "512Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: libreoffice-server
  namespace: middleware
  labels:
    app: libreoffice-server
spec:
  type: ClusterIP
  selector:
    app: libreoffice-server
  ports:
  - name: unoserver
    port: 33101
    targetPort: 5000
    protocol: TCP
