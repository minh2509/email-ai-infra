apiVersion: apps/v1
kind: Deployment
metadata:
  name: libreoffice-server
  namespace: middleware
  labels:
    app: libreoffice-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: libreoffice-server
  template:
    metadata:
      labels:
        app: libreoffice-server
    spec:
      containers:
      - name: libreoffice
        image: ghcr.io/unoconv/unoserver-docker:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 2004
          name: unoserver
        resources:
          limits:
            memory: "2Gi"
            cpu: "1000m"
          requests:
            memory: "512Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: libreoffice-server
  namespace: middleware
  labels:
    app: libreoffice-server
spec:
  type: ClusterIP
  selector:
    app: libreoffice-server
  ports:
  - port: 33101
    targetPort: 2004
    protocol: TCP
