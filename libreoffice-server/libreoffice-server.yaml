apiVersion: apps/v1
kind: Deployment
metadata:
  name: libreoffice-server
  namespace: middleware
  labels:
    app: libreoffice-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: libreoffice-server
  template:
    metadata:
      labels:
        app: libreoffice-server
    spec:
      containers:
      - name: libreoffice
        image: ghcr.io/unoconv/unoserver-docker:latest
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "Starting LibreOffice server..."
            unoserver &
            sleep 5
            echo "LibreOffice server ready on port 2002"
            tail -f /dev/null
        ports:
        - containerPort: 2002
          name: unoserver
        resources:
          limits:
            memory: "2Gi"
            cpu: "1000m"
          requests:
            memory: "512Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: libreoffice-server
  namespace: middleware
  labels:
    app: libreoffice-server
spec:
  type: ClusterIP
  selector:
    app: libreoffice-server
  ports:
  - name: unoserver
    port: 33101
    targetPort: 2002
    protocol: TCP
