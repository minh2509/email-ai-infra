apiVersion: apps/v1
kind: Deployment
metadata:
  name: gotenberg
  namespace: middleware
  labels:
    app: gotenberg
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gotenberg
  template:
    metadata:
      labels:
        app: gotenberg
    spec:
      containers:
      - name: gotenberg
        image: gotenberg/gotenberg:8
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: GOTENBERG_API_PORT
          value: "3000"
        - name: GOTENBERG_API_TIMEOUT
          value: "180s"
        - name: GOTENBERG_LOG_LEVEL
          value: "info"
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 60
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: gotenberg
  namespace: middleware
  labels:
    app: gotenberg
spec:
  type: ClusterIP
  selector:
    app: gotenberg
  ports:
  - name: http
    port: 3000
    targetPort: 3000
    protocol: TCP
