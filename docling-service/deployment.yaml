apiVersion: apps/v1
kind: Deployment
metadata:
  name: docling-service
  namespace: middleware
  labels:
    app: docling-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docling-service
  template:
    metadata:
      labels:
        app: docling-service
    spec:
      containers:
      - name: docling
        image: quay.io/docling/docling-serve:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
          name: http
        env:
        - name: DOCLING_ARTIFACTS_PATH
          value: "/tmp/docling"
        - name: LOG_LEVEL
          value: "info"
        resources:
          limits:
            memory: "4Gi"
            cpu: "2000m"
          requests:
            memory: "2Gi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 60
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 120
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: docling-service
  namespace: middleware
  labels:
    app: docling-service
spec:
  type: ClusterIP
  selector:
    app: docling-service
  ports:
  - name: http
    port: 5000
    targetPort: 5000
    protocol: TCP
