apiVersion: apps/v1
kind: Deployment
metadata:
  name: metabase
  namespace: middleware
  labels:
    app: metabase
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metabase
  template:
    metadata:
      labels:
        app: metabase
    spec:
      containers:
        - name: metabase
          image: metabase/metabase:v0.55.4
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: MB_DB_TYPE
              value: "postgres"
            - name: MB_DB_HOST
              value: "postgres-service.database.svc.cluster.local"
            - name: MB_DB_PORT
              value: "5432"
            - name: MB_DB_DBNAME
              value: "email_ai"
            - name: MB_DB_USER
              value: "admin"
            - name: MB_DB_PASS
              value: "123456"
            - name: MB_DB_SSL
              value: "false"
            - name: JAVA_TIMEZONE
              value: "Asia/Ho_Chi_Minh"
            - name: JAVA_TOOL_OPTIONS
              value: "-Xmx512m -Xms256m -XX:+UseG1GC -XX:MaxRAMPercentage=75.0"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "768Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 300
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
