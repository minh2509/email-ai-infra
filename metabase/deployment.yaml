apiVersion: apps/v1
kind: Deployment
metadata:
  name: metabase
  namespace: middleware
  labels:
    app: metabase
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metabase
  template:
    metadata:
      labels:
        app: metabase
    spec:
      containers:
        - name: metabase
          image: metabase/metabase:v0.55.4
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: MB_DB_TYPE
              value: "postgres"
            - name: MB_DB_HOST
              value: "postgres-service.database.svc.cluster.local"
            - name: MB_DB_PORT
              value: "5432"
            - name: MB_DB_DBNAME
              value: "email_ai"
            - name: MB_DB_USER
              value: "admin"
            - name: MB_DB_PASS
              value: "123456"
            - name: MB_DB_SSL
              value: "false"
            - name: JAVA_TIMEZONE
              value: "Asia/Ho_Chi_Minh"
            - name: JAVA_TOOL_OPTIONS
              value: "-Xmx1536m -Xms1024m"
            - name: JAVA_OPTS
              value: "-Xmx1536m -Xms1024m"
          resources:
            requests:
              memory: "1536Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 240
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 90
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 20
