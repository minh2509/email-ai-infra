apiVersion: batch/v1
kind: Job
metadata:
  name: n8n-workflow-importer
  namespace: middleware
spec:
  ttlSecondsAfterFinished: 60
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: importer
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              echo "Waiting for n8n to be ready..."
              sleep 15
              
              echo "Testing API connection with Basic Auth..."
              curl -X GET \
                "http://n8n.middleware.svc.cluster.local:5678/rest/workflows" \
                -u "${N8N_USERNAME}:${N8N_PASSWORD}"
              
              echo ""
              echo "Importing workflow..."
              curl -X POST \
                "http://n8n.middleware.svc.cluster.local:5678/rest/workflows" \
                -u "${N8N_USERNAME}:${N8N_PASSWORD}" \
                -H "Content-Type: application/json" \
                -d "@/workflows/email-ai-processor.json"
              
              echo ""
              echo "Done!"
          volumeMounts:
            - name: workflows
              mountPath: /workflows
              readOnly: true
          env:
            - name: N8N_USERNAME
              valueFrom:
                secretKeyRef:
                  name: n8n-basic-auth
                  key: username
            - name: N8N_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: n8n-basic-auth
                  key: password
      volumes:
        - name: workflows
          configMap:
            name: n8n-workflows
