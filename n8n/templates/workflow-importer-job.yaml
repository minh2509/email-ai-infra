apiVersion: batch/v1
kind: Job
metadata:
  name: n8n-workflow-importer
  namespace: middleware
spec:
  ttlSecondsAfterFinished: 120
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: importer
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              echo "Waiting for n8n to be ready..."
              sleep 15
              
              echo ""
              echo "=== Test 1: Check if n8n is alive ==="
              curl -X GET "http://n8n.middleware.svc.cluster.local:5678/healthz" -v
              
              echo ""
              echo "=== Test 2: Try to get settings (no auth) ==="
              curl -X GET "http://n8n.middleware.svc.cluster.local:5678/rest/settings" -v
              
              echo ""
              echo "=== Test 3: Try Basic Auth with /rest/login ==="
              curl -X POST "http://n8n.middleware.svc.cluster.local:5678/rest/login" \
                -H "Content-Type: application/json" \
                -d "{\"email\":\"${N8N_USERNAME}\",\"password\":\"${N8N_PASSWORD}\"}" \
                -v
              
              echo ""
              echo "=== Test 4: If login works, get workflows with cookie ==="
              # Lưu cookie từ login
              curl -X POST "http://n8n.middleware.svc.cluster.local:5678/rest/login" \
                -H "Content-Type: application/json" \
                -d "{\"email\":\"${N8N_USERNAME}\",\"password\":\"${N8N_PASSWORD}\"}" \
                -c /tmp/cookies.txt
              
              echo ""
              echo "Getting workflows with session cookie..."
              curl -X GET "http://n8n.middleware.svc.cluster.local:5678/rest/workflows" \
                -b /tmp/cookies.txt \
                -v
          volumeMounts:
            - name: workflows
              mountPath: /workflows
              readOnly: true
          env:
            - name: N8N_USERNAME
              valueFrom:
                secretKeyRef:
                  name: n8n-basic-auth
                  key: username
            - name: N8N_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: n8n-basic-auth
                  key: password
      volumes:
        - name: workflows
          configMap:
            name: n8n-workflows
