apiVersion: batch/v1
kind: Job
metadata:
  name: n8n-workflow-importer
  namespace: middleware  # Đổi thành namespace của n8n
spec:
  ttlSecondsAfterFinished: 60
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: importer
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              # Đợi n8n service sẵn sàng
              sleep 10
              
              # Gọi n8n API để import workflow
              curl -X POST \
                "http://n8n.middleware.svc.cluster.local:5678/rest/workflows" \
                -H "Content-Type: application/json" \
                -H "X-N8N-API-KEY: ${N8N_API_KEY}" \
                -d "@/workflows/email-ai-processor.json"
          volumeMounts:
            - name: workflows
              mountPath: /workflows
              readOnly: true
          env:
            - name: N8N_API_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n-api-key
                  key: api-key
      volumes:
        - name: workflows
          configMap:
            name: n8n-workflows
