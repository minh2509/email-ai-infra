apiVersion: batch/v1
kind: Job
metadata:
  name: n8n-workflow-importer
  namespace: middleware
spec:
  ttlSecondsAfterFinished: 120
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: importer
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              echo "Waiting for n8n to be ready..."
              sleep 15
              
              echo ""
              echo "=== Step 1: Login to n8n ==="
              curl -X POST \
                "http://n8n.middleware.svc.cluster.local:5678/rest/login" \
                -H "Content-Type: application/json" \
                -d "{\"emailOrLdapLoginId\":\"${N8N_USERNAME}\",\"password\":\"${N8N_PASSWORD}\"}" \
                -c /tmp/cookies.txt \
                -v
              
              echo ""
              echo "=== Step 2: Import workflow ==="
              curl -X POST \
                "http://n8n.middleware.svc.cluster.local:5678/rest/workflows" \
                -H "Content-Type: application/json" \
                -b /tmp/cookies.txt \
                -d "@/workflows/email-ai-processor.json" \
                -v
              
              echo ""
              echo "=== Done ==="
          volumeMounts:
            - name: workflows
              mountPath: /workflows
              readOnly: true
          env:
            - name: N8N_USERNAME
              valueFrom:
                secretKeyRef:
                  name: n8n-basic-auth
                  key: username
            - name: N8N_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: n8n-basic-auth
                  key: password
      volumes:
        - name: workflows
          configMap:
            name: n8n-workflows
