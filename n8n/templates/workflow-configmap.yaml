        "jsCode": "// Lấy tất cả binary keys\nconst binaryKeys = Object.keys($binary);\nconst attachments = [];\n\n// Lấy dữ liệu JSON gốc từ email trigger\nconst originalData = $input.item.json;\n\nconsole.log(\"Email Trigger - Original data keys:\", Object.keys(originalData));\n\n// Lấy message_id từ metadata\nlet messageId = 'unknown';\n\nif (originalData.metadata && originalData.metadata['message-id']) {\n  messageId = originalData.metadata['message-id'];\n} else if (originalData['message-id']) {\n  messageId = originalData['message-id'];\n} else if (originalData.messageId) {\n  messageId = originalData.messageId;\n}\n\nconsole.log(\"Message ID tìm thấy:\", messageId);\n\n// Duyệt qua từng binary key để tạo metadata\nbinaryKeys.forEach(key => {\n  const binaryData = $binary[key];\n  \n  attachments.push({\n    filename: binaryData.fileName || key,\n    mimeType: binaryData.mimeType || 'application/octet-stream',\n    size: binaryData.fileSize || 0,\n    binaryId: key,\n    id: key\n  });\n});\n\n// Tạo output: GIỮ NGUYÊN binary data\nconst outputItem = {\n  json: {\n    ...originalData,\n    message_id: messageId,\n    attachments: attachments\n  },\n  binary: {\n    ...$binary  // <-- QUAN TRỌNG: Giữ lại tất cả binary\n  }\n};\n\nconsole.log(\"Code dau - Output keys:\", Object.keys(outputItem.json));\nconsole.log(\"Code dau - message_id:\", outputItem.json.message_id);\nconsole.log(\"Code dau - attachments count:\", attachments.length);\nconsole.log(\"Code dau - binary keys:\", Object.keys(outputItem.binary));\n\nreturn outputItem;"
