    {
      "parameters": {
        "description": "Use this tool to classify hotel emails based on strict business rules.\nIt returns topic_rule and importance_override.\nAlways use this tool before deciding the final topic.\n",
        "jsCode": "const subject = $json.subject?.toLowerCase() || \"\";\nconst body = $json.body?.toLowerCase() || \"\";\n\nlet topic = \"OTHER\";\nlet importance_override = null;\n\n// RULE PHÂN LOẠI\n\nif (subject.includes(\"book\") || body.includes(\"reservation\") || body.includes(\"room\")) {\n  topic = \"BOOKING\";\n}\n\nelse if (body.includes(\"cancel\")) {\n  topic = \"CANCELLATION\";\n}\n\nelse if (\n  body.includes(\"complaint\") ||\n  body.includes(\"not happy\") ||\n  body.includes(\"bad service\") ||\n  body.includes(\"dirty\")\n) {\n  topic = \"COMPLAINT\";\n  importance_override = 5;\n}\n\nelse if (\n  body.includes(\"payment\") ||\n  body.includes(\"invoice\") ||\n  body.includes(\"bill\")\n) {\n  topic = \"PAYMENT\";\n}\n\nelse if (\n  body.includes(\"price\") ||\n  body.includes(\"information\") ||\n  body.includes(\"details\")\n) {\n  topic = \"INQUIRY\";\n}\n\n// RULE ƯU TIÊN CAO\n\nif (subject.includes(\"urgent\") || body.includes(\"asap\")) {\n  importance_override = 5;\n}\n\n// RETURN\nreturn {\n  topic_rule: topic,\n  importance_override\n};\n"
      },
      "type": "@n8n/n8n-nodes-langchain.toolCode",
      "typeVersion": 1.3,
      "position": [
        -752,
        1328
      ],
      "id": "54b16cb1-289e-4e12-bb9d-fd2344e8e390",
      "name": "hotel_rule_engine"
    },
    {
      "parameters": {
        "description": "Detect important keywords in the email such as urgent, refund, discount, complaint.\nReturns a list of flags.\n",
        "jsCode": "const text = ($json.subject + \" \" + $json.body).toLowerCase();\n\nlet flags = [];\n\nif (text.includes(\"urgent\") || text.includes(\"asap\")) {\n  flags.push(\"URGENT\");\n}\n\nif (text.includes(\"refund\")) {\n  flags.push(\"REFUND\");\n}\n\nif (text.includes(\"discount\") || text.includes(\"promotion\")) {\n  flags.push(\"DISCOUNT\");\n}\n\nif (text.includes(\"complaint\") || text.includes(\"not happy\")) {\n  flags.push(\"COMPLAINT_SIGNAL\");\n}\n\nreturn {\n  flags\n};\n"
      },
      "type": "@n8n/n8n-nodes-langchain.toolCode",
      "typeVersion": 1.3,
      "position": [
        -624,
        1328
      ],
      "id": "0160f9be-2c64-4413-b4e7-779d35df3ca3",
      "name": "keyword_intent_tool"
    },
    {
      "parameters": {
        "description": "Calculate customer importance score based on history, topic, and keywords.\n",
        "jsCode": "let score = 1;\n\n// từ DB tool\nconst totalEmails = $json.total_emails || 0;\n\n// từ rule tool\nconst topic = $json.topic_rule || \"\";\n\n// từ keyword tool\nconst flags = $json.flags || [];\n\n// LOGIC\n\nif (totalEmails > 10) score += 2;\nif (totalEmails > 20) score += 1;\n\nif (topic === \"BOOKING\") score += 3;\nif (topic === \"COMPLAINT\") score += 2;\n\nif (flags.includes(\"URGENT\")) score += 2;\nif (flags.includes(\"REFUND\")) score += 1;\n\n// LIMIT\nif (score > 5) score = 5;\n\nreturn {\n  customer_score: score\n};\n"
      },
      "type": "@n8n/n8n-nodes-langchain.toolCode",
      "typeVersion": 1.3,
